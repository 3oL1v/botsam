<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dry Market Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Dry Market Dashboard</h1>
          <p id="appSubtitle">Freqtrade paper trading monitor</p>
        </div>
        <div class="top-status">
          <span class="status-dot" id="apiDot"></span>
          <span id="botState">Connecting</span>
          <strong>DRY RUN</strong>
        </div>
      </header>

      <section class="workspace">
        <aside class="pairs-panel">
          <div class="panel-title">Pairs</div>
          <div id="pairList" class="pair-list"></div>
        </aside>

        <section class="market-panel">
          <div class="market-head">
            <div>
              <div class="muted">Selected market</div>
              <h2 id="pairTitle">-</h2>
            </div>
            <div class="price-block">
              <div id="lastPrice" class="price">-</div>
              <div id="change24h" class="change">-</div>
            </div>
          </div>

          <div class="metric-row">
            <div class="metric">
              <span>Bid / Ask</span>
              <strong id="bidAsk">-</strong>
            </div>
            <div class="metric">
              <span>Spread</span>
              <strong id="spread">-</strong>
            </div>
            <div class="metric">
              <span>RSI 14</span>
              <strong id="rsiValue">-</strong>
            </div>
            <div class="metric">
              <span>24h Volume</span>
              <strong id="volume24h">-</strong>
            </div>
          </div>

          <div class="chart-wrap">
            <canvas id="priceChart" width="900" height="300"></canvas>
          </div>

          <div class="rsi-wrap">
            <div class="rsi-scale">
              <span>70</span>
              <span>35</span>
            </div>
            <canvas id="rsiChart" width="900" height="110"></canvas>
          </div>
        </section>

        <aside class="book-panel">
          <div class="panel-title">Order Book</div>
          <div class="book-head">
            <span>Price</span>
            <span>Amount</span>
            <span>Total</span>
          </div>
          <div id="asks" class="book-side asks"></div>
          <div id="midPrice" class="mid-price">-</div>
          <div id="bids" class="book-side bids"></div>
        </aside>
      </section>

      <section class="bottom-strip">
        <div class="info-panel">
          <span>Fear & Greed</span>
          <strong id="fearGreed">-</strong>
          <div class="gauge"><i id="fearGauge"></i></div>
        </div>
        <div class="info-panel">
          <span>Funding</span>
          <strong id="fundingRate">-</strong>
          <small id="fundingNote">public perpetual data</small>
        </div>
        <div class="info-panel">
          <span>Open virtual trades</span>
          <strong id="openTrades">-</strong>
          <small id="profitLine">profit -</small>
        </div>
        <div class="info-panel">
          <span>Last update</span>
          <strong id="updatedAt">-</strong>
          <small id="errorLine"></small>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
